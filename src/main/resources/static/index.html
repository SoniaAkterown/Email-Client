<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Wrapper</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

    <div id="app">
        <div id="auth-container" class="container active">
            <div class="card">
                <h2>Welcome</h2>
                <div class="tabs">
                    <button class="tab-btn active" onclick="showAuthTab('login')">Login</button>
                    <button class="tab-btn" onclick="showAuthTab('register')">Register</button>
                </div>

                <div id="login-form" class="auth-form active">
                    <input type="email" id="login-email" placeholder="Email" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button class="btn-primary" onclick="login()">Login</button>
                </div>

                <div id="register-form" class="auth-form">
                    <input type="email" id="register-email" placeholder="Email" required>
                    <input type="password" id="register-password" placeholder="Password" required>
                    <button class="btn-primary" onclick="register()">Register</button>
                </div>
            </div>
        </div>

        <div id="dashboard-container" class="container">
            <header>
                <div class="logo">Email Wrapper</div>
                <div class="user-info">
                    <span id="user-email-display"></span>
                    <button class="btn-text" onclick="logout()">Logout</button>
                </div>
            </header>

            <div class="main-content">
                <aside class="sidebar">
                    <button class="btn-compose" onclick="showView('compose')">
                        <span class="plus">+</span> Compose
                    </button>
                    <nav>
                        <a href="#" class="nav-item active" onclick="showView('inbox')">Inbox</a>
                        <a href="#" class="nav-item" onclick="showView('sent')">Sent</a>
                        <a href="#" class="nav-item">Drafts</a>
                    </nav>
                </aside>

                <section id="content-area">
                    <div id="inbox-view" class="view active">
                        <h3>Inbox</h3>
                        <div class="email-list">
                            <div class="email-item">
                                <span class="sender">Team</span>
                                <span class="subject">Welcome to Email Wrapper!</span>
                                <span class="date">Now</span>
                            </div>
                        </div>
                    </div>

                    <div id="compose-view" class="view">
                        <div class="compose-box">
                            <div class="compose-header">
                                <h3>New Message</h3>
                            </div>
                            <div class="compose-body">
                                <input type="email" id="compose-to" placeholder="To" required>
                                <input type="text" id="compose-subject" placeholder="Subject" required>
                                <textarea id="compose-body" placeholder="Message body..." rows="10" required></textarea>
                            </div>
                            <div class="compose-footer">
                                <button class="btn-primary" onclick="sendEmail()">Send</button>
                            </div>
                        </div>
                    </div>

                    <div id="sent-view" class="view">
                        <h3>Sent</h3>
                        <div class="email-list">
                            <div class="email-item">
                                <span class="sender">To: No one yet</span>
                                <span class="subject">Start sending emails!</span>
                                <span class="date">--</span>
                            </div>
                        </div>
                    </div>

                </section>
            </div>
        </div>
    </div>

    <div id="email-detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeEmailModal()">&times;</span>
            <h2 id="modal-subject">Subject</h2>
            <div class="email-meta">
                <span id="modal-from">From: </span>
                <span id="modal-date">Date: </span>
            </div>
            <div id="modal-body" class="email-body-content"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>

</html>
